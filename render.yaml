services:
  - type: web
    name: onsite-sign-server
    runtime: python
    plan: free
    buildCommand: ""
    startCommand: python sign_server.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: ZOHO_BASE_URL
        value: https://sign.zoho.eu
      - key: ZOHO_ACCOUNTS_BASE_URL
        value: https://accounts.zoho.eu
      - key: ZOHO_TEMPLATE_ID
        value: 109352000000046015
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: ZOHO_SIGN_TOKEN
        sync: false
      - key: ZOHO_EMBED_LOCALE
        value: de
      - key: FEISHU_BASE_URL
        value: https://open.feishu.cn
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_APP_TOKEN
        sync: false
      - key: FEISHU_TABLE_ID
        value: tblHCxh8GzFQMxtO
      - key: DEFAULT_NOTIFY_OPEN_ID
        sync: false
      - key: TRIGGER_AUTH_TOKEN
        sync: false
      - key: ZOHO_WEBHOOK_SECRET
        sync: false
      - key: REQUEST_MAP_FILE
        value: request_map.json
